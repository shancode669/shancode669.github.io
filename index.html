// ─── HOOKS ─────────────────────────────────────────────────────
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) setVisible(true); },
      { threshold }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

// ─── SECTION REVEAL WRAPPER ──────────────────────────────
function SectionReveal({ children, direction = "up", delay = 0, style = {}, id }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  const [scanning, setScanning] = useState(false);

  useEffect(() => {
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting && !visible) {
          setVisible(true);
          setScanning(true);
          setTimeout(() => setScanning(false), 900);
        }
      },
      { threshold: 0.08 }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [visible]);

  const getTransform = () => {
    if (visible) return "translate(0,0)";
    if (direction === "left")  return "translateX(-40px)";
    if (direction === "right") return "translateX(40px)";
    return "translateY(48px)";
  };

  return (
    <div id={id} ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: getTransform(),
      transition: "opacity 0.5s cubic-bezier(0.25,0.46,0.45,0.94) " + delay + "s, transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94) " + delay + "s",
      position: "relative",
      ...style,
    }}>
      {scanning && (
        <div style={{
          position: "absolute", top: 0, left: "-100%",
          width: "100%", height: "1px",
          background: "linear-gradient(90deg, transparent, #C9A84C, #F7E9B8, #C9A84C, transparent)",
          animation: "sectionSweep 0.7s cubic-bezier(0.25,0.46,0.45,0.94) forwards",
          pointerEvents: "none", zIndex: 10,
          boxShadow: "0 0 12px rgba(201,168,76,0.8)",
        }} />
      )}
      {children}
    </div>
  );
}

// ─── HEXAGONAL RADAR CHART ─────────────────────────────────────
function HexRadarChart({ theme, animate }) {
  const cx = 200, cy = 200, maxR = 150;
  const n = RADAR_AXES.length;

  const angleOf = (i) => (Math.PI * 2 * i) / n - Math.PI / 2;

  const ringPoints = (r) =>
    RADAR_AXES.map((_, i) => {
      const a = angleOf(i);
      return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    });

  const dataPoints = RADAR_AXES.map((ax, i) => {
    const r = animate ? (ax.value / 100) * maxR : 0;
    const a = angleOf(i);
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  });

  const toPath = (pts) => pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ") + " Z";

  const rings = [0.25, 0.5, 0.75, 1.0];

  return (
    <div style={{ position: "relative", width: "400px", maxWidth: "100%" }}>
      <svg viewBox="0 0 400 400" style={{ width: "100%", overflow: "visible" }}>
        {/* Background rings */}
        {rings.map((r, ri) => (
          <polygon
            key={ri}
            points={ringPoints(r * maxR).map(p => p.join(",")).join(" ")}
            fill="none"
            stroke={theme.border}
            strokeWidth={ri === rings.length - 1 ? "1" : "0.5"}
            opacity={ri === rings.length - 1 ? 0.8 : 0.4}
          />
        ))}

        {/* Axis lines */}
        {RADAR_AXES.map((_, i) => {
          const [x, y] = ringPoints(maxR)[i];
          return (
            <line key={i} x1={cx} y1={cy} x2={x} y2={y}
              stroke={theme.border} strokeWidth="0.5" opacity="0.5" />
          );
        })}

        {/* Data area */}
        <path
          d={toPath(dataPoints)}
          fill={`${theme.gold}18`}
          stroke={theme.gold}
          strokeWidth="1.5"
          style={{ transition: animate ? "all 1.4s cubic-bezier(0.25,0.46,0.45,0.94)" : "none" }}
        />

        {/* Glow data area */}
        <path
          d={toPath(dataPoints)}
          fill="none"
          stroke={theme.goldLight}
          strokeWidth="0.5"
          opacity="0.5"
          style={{ filter: `drop-shadow(0 0 6px ${theme.gold})` }}
        />

        {/* Data points */}
        {dataPoints.map(([x, y], i) => (
          <circle key={i} cx={x} cy={y} r="4"
            fill={theme.goldLight}
            style={{
              filter: `drop-shadow(0 0 8px ${theme.gold})`,
              transition: animate ? `all 1.4s cubic-bezier(0.25,0.46,0.45,0.94) ${i * 0.08}s` : "none",
            }}
          />
        ))}

        {/* Axis labels */}
        {RADAR_AXES.map((ax, i) => {
          const a = angleOf(i);
          const labelR = maxR + 28;
          const lx = cx + labelR * Math.cos(a);
          const ly = cy + labelR * Math.sin(a);
          const anchor = Math.abs(Math.cos(a)) < 0.1 ? "middle" : Math.cos(a) > 0 ? "start" : "end";
          return (
            <g key={i}>
              <text x={lx} y={ly + 4}
                textAnchor={anchor}
                style={{
                  fontFamily: "'Cinzel', serif",
                  fontSize: "11px",
                  fill: theme.textDim,
                  letterSpacing: "0.1em",
                }}
              >
                {ax.label}
              </text>
              <text x={lx} y={ly + 18}
                textAnchor={anchor}
                style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: "9px",
                  fill: theme.gold,
                }}
              >
                {ax.value}%
              </text>
            </g>
          );
        })}

        {/* Center dot */}
        <circle cx={cx} cy={cy} r="3" fill={theme.gold}
          style={{ filter: `drop-shadow(0 0 6px ${theme.gold})` }} />
      </svg>
    </div>
  );
}

// ─── FAKE TERMINAL ─────────────────────────────────────────────
function FakeTerminal({ theme }) {
  const [lines, setLines] = useState([
    { type: "sys",    text: "SHANTHAN_TERMINAL v2.4.1 — Secure Shell Interface" },
    { type: "sys",    text: "Type 'help' to see available commands." },
    { type: "spacer", text: "" },
  ]);
  const [input, setInput] = useState("");
  const [history, setHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [lines]);

  const runCommand = useCallback((cmd) => {
    const trimmed = cmd.trim().toLowerCase();
    if (!trimmed) return;

    setHistory(h => [trimmed, ...h]);
    setHistIdx(-1);

    const newLines = [{ type: "input", text: `$ ${cmd}` }];

    if (trimmed === "clear") {
      setLines([
        { type: "sys", text: "SHANTHAN_TERMINAL v2.4.1 — Secure Shell Interface" },
        { type: "spacer", text: "" },
      ]);
      return;
    }

    const response = TERMINAL_COMMANDS[trimmed];
    if (response) {
      response.split("\n").forEach(line => {
        newLines.push({ type: "output", text: line });
      });
    } else {
      newLines.push({ type: "error", text: `> Command not found: '${trimmed}'. Type 'help' for commands.` });
    }

    newLines.push({ type: "spacer", text: "" });
    setLines(l => [...l, ...newLines]);
  }, []);

  const onKeyDown = (e) => {
    if (e.key === "Enter") {
      runCommand(input);
      setInput("");
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setHistIdx(i => {
        const next = Math.min(i + 1, history.length - 1);
        setInput(history[next] || "");
        return next;
      });
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      setHistIdx(i => {
        const next = Math.max(i - 1, -1);
        setInput(next === -1 ? "" : history[next]);
        return next;
      });
    }
  };

  const lineColor = (type) => {
    if (type === "sys")    return theme.gold;
    if (type === "input")  return theme.goldLight;
    if (type === "error")  return "#c94c4c";
    if (type === "spacer") return "transparent";
    return theme.textDim;
  };

  return (
    <div
      onClick={() => inputRef.current?.focus()}
      style={{
        background: theme.bg2,
        border: `1px solid ${theme.border}`,
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: "12px",
        cursor: "text",
        overflow: "hidden",
      }}
    >
      {/* Terminal chrome */}
      <div style={{
        padding: "10px 18px",
        borderBottom: `1px solid ${theme.border}`,
        display: "flex", alignItems: "center", gap: "10px",
        background: theme.bg3,
      }}>
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: theme.gold, boxShadow: `0 0 8px ${theme.gold}` }} />
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: theme.borderMid }} />
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: theme.border }} />
        <span style={{ marginLeft: 12, fontSize: 10, letterSpacing: "0.2em", color: theme.textMuted }}>
          shanthan@portfolio:~$
        </span>
        <span style={{
          marginLeft: "auto", fontSize: 9, letterSpacing: "0.15em",
          color: theme.gold, border: `1px solid ${theme.border}`, padding: "2px 8px",
        }}>
          SECURE
        </span>
      </div>

      {/* Output area */}
      <div style={{
        height: "320px", overflowY: "auto", padding: "20px 20px 8px",
        scrollbarWidth: "thin",
      }}>
        {lines.map((line, i) => (
          <div key={i} style={{
            color: lineColor(line.type),
            lineHeight: "1.7",
            letterSpacing: line.type === "input" ? "0.05em" : "0.02em",
            whiteSpace: "pre-wrap",
            wordBreak: "break-all",
          }}>
            {line.text || "\u00A0"}
          </div>
        ))}
        <div ref={bottomRef} />
      </div>

      {/* Input row */}
      <div style={{
        borderTop: `1px solid ${theme.border}`,
        padding: "12px 20px",
        display: "flex", alignItems: "center", gap: "10px",
      }}>
        <span style={{ color: theme.gold, userSelect: "none" }}>$</span>
        <input
          ref={inputRef}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={onKeyDown}
          placeholder="type a command..."
          style={{
            flex: 1, background: "transparent", border: "none", outline: "none",
            fontFamily: "'JetBrains Mono', monospace", fontSize: "12px",
            color: theme.goldLight, letterSpacing: "0.05em",
            caretColor: theme.gold,
          }}
          spellCheck={false}
          autoComplete="off"
        />
        <span style={{
          fontSize: 9, letterSpacing: "0.15em",
          color: theme.textMuted, userSelect: "none",
        }}>
          ↑↓ history
        </span>
      </div>
    </div>
  );
}

// ─── GLITCH NAME — SVG-based, works in all renderers ──────────
function GlitchName({ theme }) {
  const [hovered, setHovered] = useState(null);
  const [glitch, setGlitch]   = useState(false);
  const [tick, setTick]       = useState(0);

  useEffect(() => {
    const iv = setInterval(() => {
      setGlitch(true);
      setTimeout(() => setGlitch(false), 300);
    }, 4000);
    return () => clearInterval(iv);
  }, []);

  // Animate gradient by shifting tick
  useEffect(() => {
    let raf;
    const loop = () => { setTick(t => t + 0.3); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  const letters = "SHANTHAN".split("");

  // Per-letter gold stop colours — all warm, no green
  const stops = [
    { a: "#6B4510", b: "#C9A84C", c: "#F7E9B8" },
    { a: "#7A5218", b: "#D9B84E", c: "#F0D888" },
    { a: "#9A7020", b: "#E8C860", c: "#FFF4B0" },
    { a: "#5E3C0C", b: "#BF9438", c: "#EAD880" },
    { a: "#8A6018", b: "#D4A840", c: "#F5E890" },
    { a: "#7B5010", b: "#CC9C3C", c: "#F2E070" },
    { a: "#6A4A14", b: "#C4A040", c: "#EDE080" },
    { a: "#804E10", b: "#D0A044", c: "#F3E888" },
  ];

  // SVG viewBox: 8 chars × ~90px wide each, height 130
  const W = 740, H = 130;
  const charW = W / letters.length;

  return (
    <div style={{ userSelect: "none", cursor: "default", width: "100%", maxWidth: "740px" }}>
      <svg
        viewBox={`0 0 ${W} ${H}`}
        style={{ width: "100%", overflow: "visible" }}
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          {letters.map((_, i) => {
            const { a, b, c } = stops[i];
            // Animate offset using tick so it flows
            const off1 = ((tick * 0.4 + i * 15) % 100).toFixed(1);
            const off2 = ((tick * 0.4 + i * 15 + 40) % 100).toFixed(1);
            const off3 = ((tick * 0.4 + i * 15 + 75) % 100).toFixed(1);
            const isGlit = glitch && i % 3 === 0;
            return (
              <linearGradient key={i} id={`lg${i}`} x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stopColor={isGlit ? "#ffffff" : a} />
                <stop offset={`${Math.min(parseFloat(off1), 99)}%`} stopColor={isGlit ? "#fffbe0" : b} />
                <stop offset={`${Math.min(parseFloat(off2), 99)}%`} stopColor={isGlit ? "#ffffff" : c} />
                <stop offset={`${Math.min(parseFloat(off3), 99)}%`} stopColor={b} />
                <stop offset="100%" stopColor={a} />
              </linearGradient>
            );
          })}
          {/* Glow filter */}
          <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        {letters.map((l, i) => {
          const x = charW * i + charW * 0.5;
          const isHov = hovered === i;
          const isGlit = glitch && i % 3 === 0;
          return (
            <text
              key={i}
              x={x}
              y={100}
              textAnchor="middle"
              fill={`url(#lg${i})`}
              filter={isHov ? "url(#glowStrong)" : isGlit ? "url(#glowStrong)" : "url(#glow)"}
              style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: "clamp(52px, 9.5vw, 118px)",
                fontWeight: 900,
                cursor: "default",
                transition: "transform 0.22s",
                transform: isHov ? `translate(${x}px, 100px) scale(1.08) translate(-${x}px, -100px)` : "none",
              }}
              onMouseEnter={() => setHovered(i)}
              onMouseLeave={() => setHovered(null)}
            >
              {l}
            </text>
          );
        })}
      </svg>
    </div>
  );
}
